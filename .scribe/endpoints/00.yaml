      description: |+
        Возвращает пагинированный список пользователей.

        ## Подключение связей (include)

        | Значение | Описание |
        |----------|----------|
        | `contacts` | Контакты пользователя (телефон, адрес, telegram) |
        | `contacts.verifications` | Верификации контактов |
        | `roles` | Роли пользователя (с pivot `assigned_at`) |

        Пример: `?include=contacts,contacts.verifications,roles`

        ## Фильтрация (filter)

        | Параметр | Тип | Описание |
        |----------|-----|----------|
        | `filter[status]` | exact | `created`, `active`, `blocked` |
        | `filter[name]` | partial | LIKE %value% |
        | `filter[surname]` | partial | LIKE %value% |
        | `filter[email]` | partial | LIKE %value% |
        | `filter[contacts.type]` | exact | `phone`, `address`, `telegram` |
        | `filter[contacts.value]` | partial | LIKE %value% |
        | `filter[contacts.verifications.status]` | exact | `pending`, `verified`, `failed`, `expired` |
        | `filter[contacts.verifications.code]` | exact |  |
        | `filter[roles.slug]` | exact |  |
        | `filter[roles.name]` | partial | LIKE %value% |

        ## Сортировка (sort)

        Доступные поля: `name`, `surname`, `email`, `status`, `created_at`. По умолчанию: `-created_at`. Префикс `-` — по убыванию.

        Пример: `?sort=name` или `?sort=-created_at,name`

        ## Выборка полей (fields)

        | Ресурс | Доступные поля |
        |--------|---------------|
        | `users` | `id`, `name`, `surname`, `patronymic`, `email`, `status`, `email_verified_at`, `created_at`, `updated_at` |
        | `contacts` | `id`, `user_id`, `type`, `value`, `created_at`, `updated_at` |
        | `roles` | `id`, `name`, `slug`, `description`, `created_at`, `updated_at` |

        Пример: `?fields[users]=id,name,email`

